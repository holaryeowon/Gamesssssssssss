<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">하늘과 구름 배경</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0; /* comment1 */
      padding: 0;
    }

    html, body {
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        180deg,
        #87ceeb 0%,
        #b8e0f4 35%,
        #e8f4fc 70%,
        #fef9e7 100%
      );
      transition: background 0.85s ease;
    }

    /* 벌집 안: 어두운 벌통·꿀빛 + 육각 격자 느낌 */
    body.bbatkkot-hive-inside .sky {
      background-color: #140c08;
      background-image:
        radial-gradient(ellipse 95% 55% at 50% 0%, rgba(255, 205, 90, 0.18) 0%, transparent 52%),
        radial-gradient(ellipse 70% 45% at 80% 70%, rgba(180, 120, 40, 0.12) 0%, transparent 50%),
        repeating-linear-gradient(
          120deg,
          rgba(90, 58, 22, 0.45) 0,
          rgba(90, 58, 22, 0.45) 1px,
          transparent 1px,
          transparent 26px
        ),
        repeating-linear-gradient(
          60deg,
          rgba(40, 26, 12, 0.55) 0,
          rgba(40, 26, 12, 0.55) 1px,
          transparent 1px,
          transparent 26px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(100, 68, 28, 0.2) 0,
          rgba(100, 68, 28, 0.2) 1px,
          transparent 1px,
          transparent 22px
        ),
        linear-gradient(178deg, #4d3518 0%, #2a1a0c 42%, #0a0604 100%);
    }

    body.bbatkkot-hive-inside .clouds,
    body.bbatkkot-hive-inside .clouds-back {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.65s ease, visibility 0s linear 0.65s;
    }

    /* 구름 레이어 공통 */
    .clouds {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 200px;
      filter: drop-shadow(0 4px 12px rgba(100, 140, 180, 0.15));
      opacity: 0.92;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 200px;
    }

    /* 개별 구름 모양 */
    .c1 {
      --s: 1;
      width: 120px;
      height: 40px;
      top: 18%;
      left: -140px;
      animation: drift 45s linear infinite;
    }
    .c1::before {
      width: 50px;
      height: 50px;
      top: -25px;
      left: 20px;
    }
    .c1::after {
      width: 70px;
      height: 45px;
      top: -18px;
      left: 55px;
    }

    .c2 {
      --s: 0.9;
      width: 160px;
      height: 52px;
      top: 32%;
      left: -200px;
      animation: drift 60s linear infinite 8s;
      opacity: 0.85;
    }
    .c2::before {
      width: 65px;
      height: 65px;
      top: -32px;
      left: 25px;
    }
    .c2::after {
      width: 88px;
      height: 55px;
      top: -22px;
      left: 72px;
    }

    .c3 {
      --s: 0.75;
      width: 100px;
      height: 34px;
      top: 48%;
      left: -120px;
      animation: drift 38s linear infinite 15s;
      opacity: 0.78;
    }
    .c3::before {
      width: 42px;
      height: 42px;
      top: -20px;
      left: 15px;
    }
    .c3::after {
      width: 55px;
      height: 36px;
      top: -14px;
      left: 45px;
    }

    .c4 {
      --s: 1;
      width: 200px;
      height: 60px;
      top: 62%;
      left: -240px;
      animation: drift 52s linear infinite 3s;
      opacity: 0.88;
    }
    .c4::before {
      width: 80px;
      height: 80px;
      top: -38px;
      left: 30px;
    }
    .c4::after {
      width: 100px;
      height: 62px;
      top: -28px;
      left: 95px;
    }

    .c5 {
      --s: 0.85;
      width: 130px;
      height: 44px;
      top: 78%;
      left: -150px;
      animation: drift 42s linear infinite 22s;
      opacity: 0.72;
    }
    .c5::before {
      width: 52px;
      height: 52px;
      top: -26px;
      left: 22px;
    }
    .c5::after {
      width: 72px;
      height: 46px;
      top: -18px;
      left: 58px;
    }

    @keyframes drift {
      from {
        transform: translateX(0) scale(var(--s, 1));
      }
      to {
        transform: translateX(calc(100vw + 280px)) scale(var(--s, 1));
      }
    }

    .clouds-back .cloud {
      --s: 0.65;
      opacity: 0.55;
      filter: blur(1px);
    }
    .clouds-back .c1 { animation-duration: 75s; top: 22%; }
    .clouds-back .c2 { animation-duration: 90s; top: 55%; left: -220px; }

    /* 배경 꿀벌 — 원·8자 궤도 (앞 구름 위: DOM에서 clouds 뒤에 둠) */
    .bees {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
      transform: translateX(0);
    }

    /* 시작하기: y 고정(translateX만) · 살짝 왼쪽 당김 → 오른쪽으로 쭉 나가서 화면 밖 */
    @keyframes bee-start-dash {
      0% {
        transform: translate3d(0, 0, 0);
      }
      10% {
        transform: translate3d(-28px, 0, 0);
      }
      100% {
        transform: translate3d(calc(100vw + 180px), 0, 0);
      }
    }

    .bees.bees--start-dash {
      animation: bee-start-dash 1.15s cubic-bezier(0.22, 0.65, 0.28, 1) forwards;
      will-change: transform;
    }

    .bees.bees--offscreen {
      transform: translate3d(calc(100vw + 180px), 0, 0);
      will-change: auto;
    }

    /* 노랑이 채워진 뒤 짧게 멈춤 → 퇴장 → 참나무 */
    .bee-honey-flood {
      position: fixed;
      inset: 0;
      z-index: 50;
      visibility: hidden;
      pointer-events: none;
    }

    .bee-honey-flood.is-active {
      visibility: visible;
      pointer-events: auto;
    }

    .bee-honey-flood__wave {
      position: absolute;
      inset: 0;
      clip-path: circle(0% at 0 0);
      will-change: clip-path;
    }

    .bee-honey-flood__wave--1 {
      background: radial-gradient(
        circle at 0 0,
        #fffde7 0%,
        #ffeb3b 42%,
        #fbc02d 78%,
        #f9a825 100%
      );
      opacity: 0.97;
    }

    .bee-honey-flood__wave--2 {
      background: radial-gradient(
        circle at 0 0,
        #ffe082 0%,
        #fdd835 45%,
        #f57c00 100%
      );
      opacity: 0.88;
      animation-delay: 0.14s;
    }

    .bee-honey-flood__wave--3 {
      background: radial-gradient(
        circle at 0 0,
        #fff9c4 0%,
        #ffee58 38%,
        #f9a825 95%
      );
      opacity: 0.82;
      animation-delay: 0.28s;
    }

    @keyframes bee-honey-expand {
      from {
        clip-path: circle(0% at 0 0);
      }
      to {
        clip-path: circle(165vmax at 0 0);
      }
    }

    .bee-honey-flood.is-active .bee-honey-flood__wave {
      animation: bee-honey-expand 1.45s cubic-bezier(0.38, 0.02, 0.22, 1) forwards;
    }

    /* 노랑 퇴장: 오른쪽 아래 모서리로 스르륵 줄어듦 */
    .bee-honey-flood__shrink {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: linear-gradient(
        158deg,
        #fffde7 0%,
        #ffeb3b 36%,
        #fbc02d 68%,
        #ef6c00 100%
      );
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      clip-path: circle(0% at 100% 100%);
    }

    .bee-honey-flood.is-exiting .bee-honey-flood__wave {
      opacity: 0 !important;
      visibility: hidden !important;
      animation: none !important;
    }

    @keyframes bee-honey-shrink-br {
      from {
        clip-path: circle(185vmax at 100% 100%);
      }
      to {
        clip-path: circle(0% at 100% 100%);
      }
    }

    .bee-honey-flood.is-exiting .bee-honey-flood__shrink {
      visibility: visible;
      opacity: 1;
      animation: bee-honey-shrink-br 0.68s cubic-bezier(0.42, 0.12, 0.28, 1) forwards;
    }

    /* 노랑 퇴장 직전: UI·꽃·벌만 먼저 제거(노란 막 뒤에 메뉴가 잠깐 보이는 현상 방지) */
    body.sky-only-ui .svg-defs,
    body.sky-only-ui .bees,
    body.sky-only-ui .flower-bed,
    body.sky-only-ui .sky-vines,
    body.sky-only-ui main.content {
      display: none !important;
    }

    /* 최종: 노란 오버레이까지 제거, 하늘·구름만 */
    body.sky-only .svg-defs,
    body.sky-only .bees,
    body.sky-only .flower-bed,
    body.sky-only .sky-vines,
    body.sky-only main.content,
    body.sky-only .bee-honey-flood {
      display: none !important;
    }

    /* 노란 화면 이후: 참나무 + 왼쪽 가지 벌집 */
    .bbatkkot-scene {
      position: fixed;
      inset: 0;
      z-index: 18;
      pointer-events: none;
      display: none;
      overflow: hidden;
    }

    body.sky-only .bbatkkot-scene {
      display: block;
    }

    /* 문 나간 뒤: 하늘에 플레이어 꿀벌만 + 튜토리얼 대화 */
    body.tutorial-welcome .bees,
    body.tutorial-welcome main.content,
    body.tutorial-welcome .flower-bed,
    body.tutorial-welcome .sky-vines,
    body.tutorial-welcome .bee-honey-flood,
    body.tutorial-welcome .bbatkkot-scene {
      display: none !important;
    }

    body.tutorial-welcome .player-bee-solo {
      display: flex !important;
    }

    body.tutorial-welcome .hive-room {
      display: none !important;
    }

    .player-bee-solo {
      display: none;
      position: absolute;
      left: 50%;
      top: 36%;
      transform: translate(
        calc(-50% + var(--bee-x, 0px)),
        calc(-50% + var(--bee-dy, 0px))
      );
      z-index: 6;
      pointer-events: none;
      align-items: center;
      justify-content: center;
    }

    .player-bee-solo__float {
      animation: player-bee-float 3.4s ease-in-out infinite;
    }

    .player-bee-solo__img {
      width: min(28vw, 120px);
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.22));
    }

    @keyframes player-bee-float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    .tutorial-intro {
      position: fixed;
      inset: 0;
      z-index: 60;
      align-items: flex-end;
      justify-content: center;
      padding: min(8vh, 3rem) clamp(1rem, 4vw, 2rem) max(1.25rem, env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.65s ease;
    }

    .tutorial-intro[hidden] {
      display: none !important;
    }

    body.tutorial-welcome .tutorial-intro:not([hidden]) {
      display: flex !important;
    }

    .tutorial-intro.tutorial-intro--fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .tutorial-intro__panel {
      pointer-events: auto;
      width: min(100%, 26rem);
      padding: 1.25rem 1.35rem 1.5rem;
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid rgba(100, 140, 180, 0.35);
      box-shadow: 0 12px 40px rgba(30, 60, 90, 0.22);
      text-align: center;
    }

    .tutorial-intro__line {
      margin: 0 0 0.55rem;
      font-size: clamp(1rem, 3.2vw, 1.2rem);
      color: #283593;
      font-weight: 600;
      font-family: "Segoe UI", system-ui, sans-serif;
      line-height: 1.45;
    }

    .tutorial-intro__ask {
      margin-bottom: 1rem !important;
      color: #000000;
      font-weight: 700;
    }

    .tutorial-intro__ask--shake {
      display: inline-block;
      animation: tutorial-ask-shake 0.14s ease-in-out infinite;
    }

    @keyframes tutorial-ask-shake {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(-1.5px, 1px) rotate(-0.9deg);
      }
      50% {
        transform: translate(1.5px, -1px) rotate(0.85deg);
      }
      75% {
        transform: translate(-1px, -1px) rotate(-0.5deg);
      }
    }

    .tutorial-intro__actions {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      align-items: center;
      margin-top: 0.25rem;
    }

    .tutorial-intro__btn {
      width: 3.25rem;
      height: 3.25rem;
      border: none;
      border-radius: 50%;
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      transition: transform 0.15s ease;
    }

    .tutorial-intro__btn:hover {
      transform: scale(1.08);
    }

    .tutorial-intro__btn--yes {
      background: #2e7d32;
    }

    .tutorial-intro__btn--no {
      background: #c62828;
    }

    .tutorial-intro__ok {
      margin: 0.85rem 0 0;
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: 700;
      color: #1565c0;
    }

    /* 튜토리얼 2단계: 하늘 줌 + 비행 안내 */
    body.tutorial-welcome--flight .sky {
      transform: scale(1.82);
      transform-origin: 50% 36%;
      transition: transform 0.9s cubic-bezier(0.33, 1, 0.68, 1);
    }

    body.tutorial-welcome--flight.tutorial-welcome--flight-finale .sky {
      transform: scale(2.12);
      transform-origin: 52% 38%;
      transition: transform 0.85s cubic-bezier(0.33, 1, 0.68, 1);
    }

    body.tutorial-course-hit .sky {
      filter: brightness(1.08) saturate(1.08);
      transition: filter 0.1s ease;
    }

    .tutorial-flight__panel.tutorial-flight__panel--fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .tutorial-flight__emph-shake {
      display: inline-block;
      font-weight: 800;
      color: #c62828;
      animation: tutorial-flight-emph-shake 0.14s ease-in-out infinite;
    }

    @keyframes tutorial-flight-emph-shake {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(-1.5px, 1px) rotate(-0.9deg);
      }
      50% {
        transform: translate(1.5px, -1px) rotate(0.85deg);
      }
      75% {
        transform: translate(-1px, -1px) rotate(-0.5deg);
      }
    }

    .tutorial-course {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .tutorial-course[hidden] {
      display: none !important;
    }

    .tutorial-obstacle {
      position: absolute;
      width: min(18vw, 110px);
      border-radius: 10px;
      background: linear-gradient(135deg, #5d4037 0%, #3e2723 55%, #4e342e 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.12),
        0 6px 18px rgba(0, 0, 0, 0.28);
      border: 2px solid rgba(40, 20, 10, 0.5);
    }

    .tutorial-obstacle--from-top {
      top: 0;
      left: 56%;
      height: min(46vh, 320px);
      transform: translateX(-50%);
    }

    .tutorial-obstacle--from-bottom {
      bottom: 0;
      left: 72%;
      height: min(46vh, 320px);
      transform: translateX(-50%);
    }

    .tutorial-flight__finale-ok {
      margin: 0 0 0.75rem;
      font-size: clamp(1.15rem, 3.5vw, 1.35rem);
      font-weight: 800;
      color: #1565c0;
    }

    .tutorial-flight {
      position: fixed;
      inset: 0;
      z-index: 56;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: min(10vh, 3rem) clamp(1rem, 4vw, 2rem) 5rem;
      box-sizing: border-box;
      pointer-events: none;
    }

    .tutorial-flight[hidden] {
      display: none !important;
    }

    .tutorial-flight:not([hidden]) {
      display: flex;
    }

    .tutorial-flight__panel {
      pointer-events: auto;
      width: min(100%, 26rem);
      padding: 1.15rem 1.3rem 1.35rem;
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(100, 140, 180, 0.35);
      box-shadow: 0 12px 40px rgba(30, 60, 90, 0.2);
      text-align: center;
      transition: opacity 0.65s ease;
    }

    .tutorial-flight__line {
      margin: 0 0 0.5rem;
      font-size: clamp(0.98rem, 3vw, 1.15rem);
      color: #283593;
      font-weight: 600;
      font-family: "Segoe UI", system-ui, sans-serif;
      line-height: 1.42;
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity 0.45s ease,
        transform 0.45s ease;
    }

    .tutorial-flight__line:last-of-type {
      margin-bottom: 0.35rem;
    }

    .tutorial-flight__line.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tutorial-flight__continue {
      margin-top: 0.75rem;
      padding: 0.55rem 1.25rem;
      border-radius: 999px;
      border: 1px solid rgba(46, 125, 50, 0.45);
      background: #e8f5e9;
      color: #1b5e20;
      font: inherit;
      font-size: clamp(0.9rem, 2.6vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(30, 80, 40, 0.12);
    }

    .tutorial-flight__continue:hover {
      background: #c8e6c9;
    }

    .tutorial-space-hint {
      position: fixed;
      left: 50%;
      bottom: max(12vh, 5.5rem);
      z-index: 58;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateX(-50%);
      opacity: 0.52;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .tutorial-space-hint[hidden] {
      display: none !important;
    }

    .tutorial-space-hint:not([hidden]) {
      display: flex;
    }

    .tutorial-space-hint__kbd {
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(30, 40, 70, 0.85);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .tutorial-space-hint__mobile-btn {
      border: 0;
      border-radius: 999px;
      padding: 0.7rem 1.4rem;
      min-width: 7.5rem;
      background: rgba(255, 255, 255, 0.94);
      color: rgba(23, 35, 66, 0.92);
      box-shadow:
        0 6px 20px rgba(15, 36, 67, 0.2),
        inset 0 0 0 1px rgba(63, 93, 147, 0.25);
      font: inherit;
      font-size: clamp(0.85rem, 3.4vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      touch-action: none;
      cursor: pointer;
      user-select: none;
    }

    .tutorial-space-hint__mobile-btn:active {
      transform: translateY(1px);
      box-shadow:
        0 4px 14px rgba(15, 36, 67, 0.24),
        inset 0 0 0 1px rgba(63, 93, 147, 0.34);
    }

    body.tutorial-welcome--flight .player-bee-solo__float {
      animation-play-state: paused;
    }

    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(5px);
    }

    .settings-modal[hidden] {
      display: none !important;
    }

    .settings-modal:not([hidden]) {
      display: flex;
    }

    .settings-modal__sheet {
      position: relative;
      width: min(100%, 22rem);
      padding: 1.25rem 1.35rem 1.5rem;
      border-radius: 14px;
      background: rgba(255, 253, 250, 0.97);
      border: 1px solid rgba(80, 120, 160, 0.35);
      box-shadow: 0 14px 44px rgba(20, 40, 70, 0.28);
      color: #263238;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .settings-modal__title {
      margin: 0 0 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1565c0;
    }

    .settings-modal__close {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      border-radius: 8px;
      background: rgba(100, 130, 170, 0.18);
      color: #37474f;
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
    }

    .settings-modal__close:hover {
      background: rgba(100, 130, 170, 0.3);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .settings-row__label {
      font-weight: 600;
      color: #37474f;
    }

    .settings-lang-btn {
      min-width: 7.5rem;
      padding: 0.45rem 0.85rem;
      border-radius: 10px;
      border: 2px solid #90caf9;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      color: #1565c0;
    }

    .settings-lang-btn:hover {
      background: #e3f2fd;
    }

    .settings-lang-picker {
      margin-top: 0.5rem;
      padding: 0.5rem;
      border-radius: 10px;
      background: #eceff1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .settings-lang-picker[hidden] {
      display: none !important;
    }

    .settings-lang-option {
      padding: 0.55rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }

    .settings-lang-option:hover {
      background: #e8eaf6;
    }

    .settings-lang-option.is-current {
      outline: 2px solid #5c6bc0;
    }

    .bbatkkot-tree-wrap {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      transform-origin: 19% 40%;
      width: min(94vw, 540px);
      height: min(74vh, 580px);
      transition: transform 1.15s cubic-bezier(0.34, 0.06, 0.23, 1);
      will-change: transform;
    }

    /* 0.3초 뒤 클래스 부여 → 벌집(왼쪽 위) 기준으로 확대 */
    .bbatkkot-tree-wrap.bbatkkot-tree-wrap--zoom-hive {
      transform: translateX(-50%) scale(2.35);
    }

    .bbatkkot-tree-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    /* 벌집 방: 침대·아기·할머니 (확대 0.3초 후 표시) */
    .hive-room {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      padding: min(2vh, 1rem);
      box-sizing: border-box;
      background: #1a0f0a;
      overflow: visible;
    }

    body.hive-room-active .hive-room {
      display: flex;
    }

    body.hive-room-active .bbatkkot-scene {
      display: none !important;
    }

    body.hive-room-active .sky {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.45s ease, visibility 0s linear 0.45s;
    }

    .hive-room-view {
      position: relative;
      flex-shrink: 0;
      width: min(96vw, 920px);
      height: min(88vh, 720px);
      max-height: 100%;
      overflow: visible;
      transform-origin: 50% 50%;
      transition: transform 1.25s cubic-bezier(0.33, 1, 0.68, 1);
      transform: scale3d(1, 1, 1);
      will-change: transform;
    }

    .hive-room-view.hive-room-view--map-zoom {
      transform: scale3d(2.55, 2.55, 1);
      transform-origin: 92% 9%;
    }

    .hive-room-zoom-wrap {
      width: 100%;
      height: 100%;
      overflow: visible;
      transition: transform 1.35s cubic-bezier(0.33, 1, 0.68, 1);
      transform-origin: 52.2% 74%;
      transform: scale3d(1, 1, 1);
      will-change: transform;
    }

    .hive-room-zoom-wrap.hive-room-zoom-wrap--baby {
      transform: scale3d(2.35, 2.35, 1);
    }

    .hive-room-svg {
      width: 100%;
      height: 100%;
      display: block;
      max-height: 100%;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.35));
    }

    .hive-baby-dialog {
      position: absolute;
      left: 50%;
      bottom: 6%;
      transform: translateX(-50%);
      z-index: 4;
      max-width: min(94vw, 24rem);
      pointer-events: none;
    }

    .hive-baby-dialog__bubble {
      padding: 0.7rem 1.05rem;
      border-radius: 16px;
      background: rgba(255, 249, 230, 0.96);
      border: 2px solid #ffe082;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.38);
      color: #3e2723;
      font-size: clamp(0.95rem, 2.7vw, 1.12rem);
      line-height: 1.45;
      font-family: "Segoe UI", system-ui, sans-serif;
      text-align: center;
    }

    .hive-baby-dialog__line {
      margin: 0;
      opacity: 0;
    }

    .hive-baby-dialog__line--2 {
      margin-top: 0.45rem;
    }

    .hive-baby-dialog--visible .hive-baby-dialog__line--1 {
      animation: hive-baby-line-in 0.42s ease forwards;
    }

    .hive-baby-dialog--visible .hive-baby-dialog__line--2 {
      animation: hive-baby-line-in 0.48s ease 0.32s forwards;
    }

    @keyframes hive-baby-line-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hive-map-gain {
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%);
      z-index: 7;
      max-width: min(92vw, 20rem);
      pointer-events: none;
      text-align: center;
    }

    .hive-map-gain__text {
      margin: 0;
      padding: 0.55rem 1rem;
      border-radius: 12px;
      background: rgba(255, 249, 230, 0.95);
      border: 2px solid #ffe082;
      color: #3e2723;
      font-size: clamp(0.95rem, 2.8vw, 1.12rem);
      font-weight: 600;
      font-family: "Segoe UI", system-ui, sans-serif;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
    }

    .hive-map-hud {
      position: absolute;
      top: max(0.45rem, env(safe-area-inset-top, 0px));
      right: max(0.45rem, env(safe-area-inset-right, 0px));
      z-index: 8;
      width: 3.35rem;
      height: 3.35rem;
      padding: 0;
      border: 2px solid #8d6e63;
      border-radius: 14px;
      background: linear-gradient(160deg, #fffde7, #ffecb3);
      color: #4e342e;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.38);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .hive-map-hud:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.42);
    }

    .hive-map-hud[hidden] {
      display: none !important;
    }

    .hive-map-hud:not([hidden]) {
      display: flex;
      animation: hive-map-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes hive-map-pop {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .hive-room__stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      overflow: visible;
    }

    .hive-shelf-note {
      cursor: pointer;
    }

    .hive-shelf-note:focus {
      outline: none;
    }

    .hive-shelf-note:focus-visible rect,
    .hive-shelf-note:focus-visible path {
      stroke: #ffc107;
      stroke-width: 2;
    }

    .hive-note-modal {
      position: fixed;
      inset: 0;
      z-index: 55;
      align-items: center;
      justify-content: center;
      padding: clamp(0.75rem, 3vw, 1.5rem);
      box-sizing: border-box;
      background: rgba(10, 6, 4, 0.62);
      backdrop-filter: blur(4px);
    }

    .hive-note-modal[hidden] {
      display: none !important;
    }

    .hive-note-modal:not([hidden]) {
      display: flex;
    }

    .hive-note-modal__sheet {
      position: relative;
      width: min(100%, 26rem);
      max-height: min(84vh, 36rem);
      overflow: auto;
      padding: clamp(1.1rem, 3vw, 1.6rem) clamp(1.25rem, 4vw, 2rem);
      border-radius: 4px;
      background:
        linear-gradient(145deg, rgba(255, 253, 245, 0.97), rgba(250, 242, 224, 0.98));
      border: 1px solid #bcaaa4;
      box-shadow:
        0 4px 0 #8d6e63,
        0 12px 40px rgba(0, 0, 0, 0.45);
      color: #3e2723;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(0.92rem, 2.5vw, 1.05rem);
      line-height: 1.65;
    }

    .hive-note-modal__close {
      position: sticky;
      top: 0;
      float: right;
      margin: -0.35rem -0.35rem 0.25rem 0.5rem;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      border: none;
      border-radius: 4px;
      background: rgba(141, 110, 99, 0.2);
      color: #5d4037;
      font-size: 1.45rem;
      line-height: 1;
      cursor: pointer;
    }

    .hive-note-modal__close:hover {
      background: rgba(141, 110, 99, 0.35);
    }

    .hive-note-modal__title {
      margin: 0 0 0.75rem;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #6d4c41;
      letter-spacing: 0.04em;
    }

    .hive-note-modal__body {
      margin: 0;
      clear: both;
      white-space: pre-line;
    }

    .hive-note-emph {
      color: #b71c1c;
      font-weight: 700;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      text-shadow: 0 0 1px rgba(183, 28, 28, 0.25);
    }

    .hive-note-modal__en {
      font-size: 0.82em;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #6d4c41;
    }

    .hive-story {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      max-height: 46vh;
      overflow-y: auto;
      padding: 0.75rem clamp(0.75rem, 3vw, 1.5rem) 1.25rem;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(26, 15, 10, 0.72) 28%,
        rgba(12, 8, 6, 0.92) 100%
      );
      pointer-events: none;
      -webkit-font-smoothing: antialiased;
    }

    .hive-story__inner {
      max-width: 36rem;
      margin: 0 auto;
      text-align: center;
    }

    .hive-story__p {
      margin: 0 0 0.65em;
      font-size: clamp(0.95rem, 2.4vw, 1.15rem);
      line-height: 1.55;
      color: #fff9e6;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
      animation: hive-story-line-in 0.55s ease-out both;
    }

    .hive-story__p:last-child {
      margin-bottom: 0;
    }

    .hive-story__emph {
      color: #ff1744;
      font-weight: 800;
      text-shadow:
        0 0 14px rgba(255, 23, 68, 0.45),
        0 1px 2px rgba(0, 0, 0, 0.9);
    }

    .hive-story__emph--shake {
      display: inline-block;
      animation: hive-story-shake 0.14s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes hive-story-shake {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(-2px, 1px) rotate(-1.1deg);
      }
      50% {
        transform: translate(2px, -1px) rotate(1deg);
      }
      75% {
        transform: translate(-1px, -1px) rotate(-0.6deg);
      }
    }

    @keyframes hive-story-line-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #hr-exit-door {
      visibility: hidden;
      pointer-events: none;
    }

    body.hive-room-has-door #hr-exit-door {
      visibility: visible;
      pointer-events: all;
      cursor: pointer;
    }

    body.hive-room-has-door #hr-exit-door:focus {
      outline: 2px solid #ffc107;
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      .hive-story__p {
        animation: none;
      }
      .hive-story__emph--shake {
        animation: none;
      }
      .hive-room-zoom-wrap,
      .hive-room-view {
        transition-duration: 0.05s;
      }
      .hive-baby-dialog--visible .hive-baby-dialog__line--1,
      .hive-baby-dialog--visible .hive-baby-dialog__line--2 {
        animation: none;
        opacity: 1;
        transform: none;
      }
      .hive-map-hud:not([hidden]) {
        animation: none;
        opacity: 1;
        transform: none;
      }
      .tutorial-intro__ask--shake {
        animation: none;
      }
      .tutorial-flight__emph-shake {
        animation: none;
      }
      .player-bee-solo__float {
        animation: none;
      }
    }

    @keyframes bee-drift-east {
      0% {
        margin-left: -18vw;
      }
      100% {
        margin-left: 100vw;
      }
    }

    .bee-slot {
      position: absolute;
      width: 0;
      height: 0;
      left: var(--bx, 50%);
      top: var(--by, 40%);
      animation: bee-drift-east var(--drift-t, 92s) linear infinite;
      animation-delay: var(--drift-delay, 0s);
    }

    .bee-orbit {
      width: 0;
      height: 0;
      animation: bee-spin var(--bee-t, 11s) linear infinite;
      animation-delay: var(--bee-delay, 0s);
      will-change: transform;
    }

    /* 반지름만 bee-arm이 옮기고, 스프라이트는 역회전 + 원근 스케일(아래=가까움=큼, 위=멀음=작음) */
    .bee-arm {
      transform: translateX(var(--bee-r, 72px));
    }

    .bee-depth-orbit {
      transform-origin: 50% 50%;
      animation: bee-depth-orbit var(--bee-t, 11s) linear infinite;
      animation-delay: var(--bee-delay, 0s);
    }

    @keyframes bee-depth-orbit {
      0% {
        transform: scale(0.95);
      }
      25% {
        transform: scale(1.32);
      }
      50% {
        transform: scale(0.95);
      }
      75% {
        transform: scale(0.64);
      }
      100% {
        transform: scale(0.95);
      }
    }

    .bee-orbit .bee-sprite {
      display: block;
      width: clamp(44px, 10.5vmin, 96px);
      height: auto;
      animation: bee-spin var(--bee-t, 11s) linear infinite reverse;
      animation-delay: var(--bee-delay, 0s);
      filter: drop-shadow(0 3px 5px rgba(40, 30, 10, 0.32));
    }

    @keyframes bee-spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .bee-path8 {
      position: absolute;
      left: var(--bx, 60%);
      top: var(--by, 20%);
      width: 0;
      height: 0;
      animation-name: bee-figure8, bee-drift-east;
      animation-duration: var(--bee-t, 14s), var(--drift-t, 92s);
      animation-timing-function: ease-in-out, linear;
      animation-iteration-count: infinite, infinite;
      animation-delay: var(--bee-delay, 0s), var(--drift-delay, 0s);
      will-change: transform, margin;
    }

    .bee-depth-path8 {
      transform-origin: 50% 50%;
      animation: bee-depth-8 var(--bee-t, 14s) ease-in-out infinite;
      animation-delay: var(--bee-delay, 0s);
    }

    @keyframes bee-depth-8 {
      0% {
        transform: scale(1.15);
      }
      12.5% {
        transform: scale(0.66);
      }
      25% {
        transform: scale(0.72);
      }
      37.5% {
        transform: scale(0.66);
      }
      50% {
        transform: scale(1.15);
      }
      62.5% {
        transform: scale(0.66);
      }
      75% {
        transform: scale(0.72);
      }
      87.5% {
        transform: scale(0.66);
      }
      100% {
        transform: scale(1.15);
      }
    }

    .bee-path8 .bee-sprite {
      display: block;
      width: clamp(44px, 10.5vmin, 96px);
      height: auto;
      filter: drop-shadow(0 3px 5px rgba(40, 30, 10, 0.32));
    }

    @keyframes bee-figure8 {
      0% {
        transform: translate(0, 0) rotate(-12deg);
      }
      12.5% {
        transform: translate(calc(var(--8w, 55px) * 0.5), calc(var(--8h, 38px) * -1)) rotate(8deg);
      }
      25% {
        transform: translate(var(--8w, 55px), 0) rotate(18deg);
      }
      37.5% {
        transform: translate(calc(var(--8w, 55px) * 0.5), var(--8h, 38px)) rotate(4deg);
      }
      50% {
        transform: translate(0, 0) rotate(-10deg);
      }
      62.5% {
        transform: translate(calc(var(--8w, 55px) * -0.5), calc(var(--8h, 38px) * -1)) rotate(-18deg);
      }
      75% {
        transform: translate(calc(var(--8w, 55px) * -1), 0) rotate(-6deg);
      }
      87.5% {
        transform: translate(calc(var(--8w, 55px) * -0.5), var(--8h, 38px)) rotate(-14deg);
      }
      100% {
        transform: translate(0, 0) rotate(-12deg);
      }
    }

    /* 하단 꽃밭 — 단색 꽃잎 + 사진 느낌(그림자), 바람 흔들림 */
    .flower-bed {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: clamp(220px, 44vh, 520px);
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .plant {
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform-origin: 50% 100%;
      margin-left: var(--overlap, 0);
      z-index: var(--z, 1);
      animation: plant-sway var(--dur, 4.2s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .plant svg {
      display: block;
      overflow: visible;
      width: auto;
      height: clamp(150px, 32vmin, 300px);
    }

    .plant--toxic svg {
      height: clamp(185px, 38vmin, 360px);
    }

    @keyframes plant-sway {
      0%, 100% {
        transform: rotate(calc(var(--tilt, 5deg) * -1)) translateX(-5px);
      }
      50% {
        transform: rotate(var(--tilt, 5deg)) translateX(7px);
      }
    }

    @keyframes plant-sway-alt {
      0%, 100% {
        transform: rotate(7deg) translateX(6px);
      }
      33% {
        transform: rotate(-9deg) translateX(-8px);
      }
      66% {
        transform: rotate(4deg) translateX(4px);
      }
    }

    .plant--b {
      animation-name: plant-sway-alt;
      animation-duration: var(--dur, 5s);
    }

    /* 독성 — 짙은 남색 + 흐릿한 냄새(블러 덩어리) */
    .stink-puff {
      animation: stink-waft var(--st-dur, 2.8s) ease-in-out infinite;
      transform-origin: 50% 100%;
    }

    .stink-puff:nth-child(2) {
      animation-delay: 0.45s;
    }

    .stink-puff:nth-child(3) {
      animation-delay: 0.9s;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .sky-vines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* 덩굴: 화면 위에서 매달려 아래로 */
    .sky-vine {
      position: absolute;
      top: 0;
      bottom: auto;
      width: clamp(72px, 14vmin, 130px);
      height: min(58vh, 480px);
      opacity: 0.9;
      align-items: flex-start;
      transform-origin: 50% 0%;
    }

    .sky-vine.plant {
      display: flex;
      transform-origin: 50% 0%;
    }

    .sky-vine--l {
      left: 0;
    }

    .sky-vine--r {
      right: 0;
    }

    .sky-vine svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .sky-vine-mini {
      position: absolute;
      left: 50%;
      margin-left: clamp(-40px, -5vmin, -26px);
      top: 0;
      width: clamp(48px, 10vmin, 80px);
      height: min(32vh, 280px);
      opacity: 0.85;
    }

    .sky-vine-mini svg {
      animation: plant-sway 4s ease-in-out infinite;
      animation-delay: -0.5s;
      transform-origin: 50% 0%;
    }

    @keyframes stink-waft {
      0%, 100% {
        opacity: 0.45;
        transform: translateY(2px) rotate(-6deg);
      }
      50% {
        opacity: 1;
        transform: translateY(-10px) rotate(10deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .plant,
      .sky-vine svg,
      .sky-vine-mini svg,
      .stink-puff,
      .bees.bees--start-dash,
      .bees.bees--offscreen {
        animation: none !important;
        transform: none !important;
      }
      .bee-slot,
      .bee-orbit,
      .bee-path8,
      .bee-depth-orbit,
      .bee-depth-path8 {
        animation: none !important;
      }
      .bee-orbit .bee-sprite {
        animation: none !important;
      }
      .plant {
        transform: none;
      }
      .bee-orbit,
      .bee-path8 {
        transform: none;
      }
      .bee-slot,
      .bee-path8 {
        margin-left: 0 !important;
      }
      .bee-depth-orbit,
      .bee-depth-path8 {
        transform: none;
      }

      function getLang() {

        if (lang !== "ko" && lang !== "en") return;
        localStorage.setItem(STORAGE_KEY, lang);
        document.documentElement.lang = lang === "en" ? "en" : "ko";
        apply(lang);
        try {
          global.dispatchEvent(
            new CustomEvent("game-lang-change", { detail: lang })
          );
        } catch (e) {}
      }

      function t(key) {
        var lang = getLang();
        var pack = STR[lang] || STR.ko;
        if (pack[key] !== undefined) return pack[key];
        return STR.ko[key] !== undefined ? STR.ko[key] : key;
      }

      function getGrandmaLines() {
        var lang = getLang();
        var pack = STR[lang] || STR.ko;
        return pack.grandmaLines || STR.ko.grandmaLines;
      }

      function apply(lang) {
        var dict = STR[lang] || STR.ko;
        document.title = dict.pageTitle || STR.ko.pageTitle;

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (!key || dict[key] === undefined) return;
          el.textContent = dict[key];
        });

        document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
          var key = el.getAttribute("data-i18n-html");
          if (!key || dict[key] === undefined) return;
          el.innerHTML = dict[key];
        });

        document.querySelectorAll("[data-i18n-attr]").forEach(function (el) {
          var speclist = el.getAttribute("data-i18n-attr");
          if (!speclist) return;
          var parts = speclist.split("|");
          for (var i = 0; i + 1 < parts.length; i += 2) {
            var attr = parts[i];
            var key = parts[i + 1];
            if (dict[key] !== undefined) el.setAttribute(attr, dict[key]);
          }
        });

        var cur = document.getElementById("settingsLangCurrent");
        if (cur) {
          cur.textContent =
            lang === "en" ? dict["lang.labelEn"] : dict["lang.labelKo"];
        }

        var koOpt = document.getElementById("settingsLangKo");
        var enOpt = document.getElementById("settingsLangEn");
        if (koOpt) koOpt.classList.toggle("is-current", lang === "ko");
        if (enOpt) enOpt.classList.toggle("is-current", lang === "en");
      }

      global.GameI18n = {
        STR: STR,
        getLang: getLang,
        setLang: setLang,
        t: t,
        apply: apply,
        getGrandmaLines: getGrandmaLines,

      function detectTouchDevice() {
        if (typeof window === "undefined") return false;
        if (window.matchMedia) {
          try {
            if (window.matchMedia("(hover: none) and (pointer: coarse)").matches)
              return true;
          } catch (e) {}
        }
        return (
          "ontouchstart" in window ||
          (navigator && navigator.maxTouchPoints > 0)
        );
      }

      function rectsOverlap(a, b) {
        return !(
          a.right < b.left ||
          a.left > b.right ||
          a.bottom < b.top ||
          a.top > b.bottom
        );
      }

      function beeInflatedRect(el, inset) {
        var r = el.getBoundingClientRect();
        var i = inset || 6;
        return {
          left: r.left + i,
          right: r.right - i,
          top: r.top + i,
          bottom: r.bottom - i,
          width: r.width - i * 2,
          height: r.height - i * 2,
        };
      }

      function startObstacleCourse() {
        if (!document.body.classList.contains("tutorial-welcome--flight")) return;
        tutorialFlightStory = "course";
        tutorialFlightDy = 0;
        tutorialFlightVel = 0;
        tutorialFlightFalling = false;
        tutorialFlightBeeX = 0;
        tutorialFlightSpaceHeld = false;
        var soloBee = document.getElementById("playerBeeSolo");
        var course = document.getElementById("tutorialCourse");
        var obsTop = document.getElementById("tutorialObsTop");
        var obsBottom = document.getElementById("tutorialObsBottom");
        if (soloBee) {
          soloBee.style.setProperty("--bee-dy", "0px");
          soloBee.style.setProperty("--bee-x", "0px");
        }
        if (course) {
          course.removeAttribute("hidden");
          course.setAttribute("aria-hidden", "false");
        }

        function tick() {
          if (tutorialFlightStory !== "course") {
            tutorialFlightRaf = null;
            return;
          }

          var rise = 3.9;
          var gravity = 2.85;
          var maxDown = 34;
          var ceiling = maxTutorialFlightAltitudePx();

          if (tutorialFlightFalling) {
            tutorialFlightVel = Math.min(maxDown, tutorialFlightVel + gravity);
            tutorialFlightDy += tutorialFlightVel;
            if (tutorialFlightDy >= 0) {
              tutorialFlightDy = 0;
              tutorialFlightFalling = false;
              tutorialFlightVel = 0;
            }
          } else if (tutorialFlightSpaceHeld) {
            tutorialFlightDy -= rise;
            if (tutorialFlightDy <= ceiling) {
              tutorialFlightDy = ceiling;
              tutorialFlightFalling = true;
              tutorialFlightVel = 4;
            }
          }

          tutorialFlightBeeX += COURSE_VX;
          if (soloBee) {
            soloBee.style.setProperty("--bee-dy", tutorialFlightDy + "px");
            soloBee.style.setProperty("--bee-x", tutorialFlightBeeX + "px");
          }

          if (tutorialFlightBeeX >= COURSE_END_X) {
            endTutorialFlightFinale();
            return;
          }

          if (soloBee && obsTop && obsBottom) {
            var beeR = beeInflatedRect(soloBee, 8);
            var topR = obsTop.getBoundingClientRect();
            var botR = obsBottom.getBoundingClientRect();
            if (rectsOverlap(beeR, topR) || rectsOverlap(beeR, botR)) {

              tutorialFlightDy = 0;
              tutorialFlightVel = 0;
              tutorialFlightFalling = false;
              if (soloBee) {
                soloBee.style.setProperty("--bee-dy", "0px");
                soloBee.style.setProperty("--bee-x", "0px");
              }
            }
          }

          tutorialFlightRaf = window.requestAnimationFrame(tick);
        }

        function finishTutorialWelcome() {
          window.clearTimeout(tutorialIntroShowTimer);
          teardownTutorialFlight();
          document.body.classList.remove("tutorial-welcome");
          intro.classList.remove("tutorial-intro--fade-out");
          intro.setAttribute("hidden", "");
          intro.setAttribute("aria-hidden", "true");
          if (soloBee) {
            soloBee.setAttribute("hidden", "");
            soloBee.setAttribute("aria-hidden", "true");
          }
          if (okLine) okLine.setAttribute("hidden", "");
          if (actions) actions.style.display = "";
          var beesEl = document.querySelector(".bees");
          if (beesEl) {
            beesEl.classList.remove("bees--offscreen", "bees--start-dash");
          }
        }

        yesBtn.addEventListener("click", function () {
          if (!document.body.classList.contains("tutorial-welcome")) return;
          if (actions) actions.style.display = "none";
          if (okLine) okLine.removeAttribute("hidden");
          window.setTimeout(function () {
            intro.classList.add("tutorial-intro--fade-out");
            window.setTimeout(startTutorialFlightPhase, 680);
          }, 780);
        });

        if (noBtn) {
          noBtn.addEventListener("click", function () {
            if (!document.body.classList.contains("tutorial-welcome")) return;
            intro.classList.add("tutorial-intro--fade-out");
            window.setTimeout(finishTutorialWelcome, 580);
          });
        }

        if (flightContinue) {
          flightContinue.addEventListener("click", function () {
            if (tutorialFlightStory !== "finale") return;
            if (!document.body.classList.contains("tutorial-welcome--flight"))
              return;
            finishTutorialWelcome();
          });
        }
      }

      initTutorialIntro();

      function initHiveExitDoor() {
        var door = document.getElementById("hr-exit-door");
        if (!door) return;
        door.addEventListener("click", function (e) {
          if (!document.body.classList.contains("hive-room-has-door")) return;
          e.preventDefault();
          exitHiveRoom();
        });
        door.addEventListener("keydown", function (e) {
          if (!document.body.classList.contains("hive-room-has-door")) return;
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            exitHiveRoom();
          }
        });
      }

      initHiveExitDoor();

      function startBabyZoomSequence() {
        if (hiveBabyZoomSeqDone) return;
        var wrap = document.getElementById("hiveRoomZoomWrap");
        var view = document.getElementById("hiveRoomView");
        if (!wrap || !view) return;
        hiveBabyZoomSeqDone = true;

        var dialog = document.getElementById("hiveBabyDialog");
        var mapHud = document.getElementById("hiveMapHud");
        var mapGain = document.getElementById("hiveMapGain");

        document.documentElement.style.overflow = "visible";
        document.body.style.overflow = "visible";

        window.clearTimeout(hiveMapPhaseTimer);
        window.clearTimeout(hiveResetTimer);

        window.requestAnimationFrame(function () {
          wrap.classList.add("hive-room-zoom-wrap--baby");
          void wrap.offsetWidth;
        });

        if (dialog) {
          dialog.removeAttribute("hidden");
          dialog.setAttribute("aria-hidden", "false");
          dialog.classList.remove("hive-baby-dialog--visible");
          void dialog.offsetWidth;
          dialog.classList.add("hive-baby-dialog--visible");
        }

        hiveMapPhaseTimer = window.setTimeout(function () {
          wrap.classList.remove("hive-room-zoom-wrap--baby");
          if (dialog) {
            dialog.setAttribute("hidden", "");
            dialog.setAttribute("aria-hidden", "true");
            dialog.classList.remove("hive-baby-dialog--visible");
          }
          if (mapHud) {
            mapHud.removeAttribute("hidden");
            mapHud.setAttribute("aria-hidden", "false");
          }
          view.classList.add("hive-room-view--map-zoom");
          if (mapGain) {
            mapGain.removeAttribute("hidden");
          }

          hiveResetTimer = window.setTimeout(function () {
            view.classList.remove("hive-room-view--map-zoom");
            if (mapGain) {
              mapGain.setAttribute("hidden", "");
            }
            document.body.classList.add("hive-room-has-door");
            var door = document.getElementById("hr-exit-door");
            if (door) {
              door.setAttribute("aria-hidden", "false");
              door.setAttribute("role", "button");
              door.setAttribute("tabindex", "0");
              door.setAttribute("aria-label", GameI18n.t("door.exitAria"));
            }
          }, 1000);
        }, 1300);
      }

      function initHiveNoteModal() {
        var note = document.getElementById("hr-secret-note");
        var modal = document.getElementById("hiveNoteModal");
        var closeBtn = document.getElementById("hiveNoteModalClose");
        if (!note || !modal || !closeBtn) return;

        function openModal() {
          modal.removeAttribute("hidden");
          document.body.style.overflow = "hidden";
          closeBtn.focus();
        }

        function closeModal() {
          modal.setAttribute("hidden", "");
          document.body.style.overflow = "";
          if (note && typeof note.focus === "function") {
            try {
              note.focus();
            } catch (err) {}
          }
          var hiveRoomEl = document.getElementById("hiveRoom");
          if (
            document.body.classList.contains("hive-room-active") ||
            (hiveRoomEl && !hiveRoomEl.hasAttribute("hidden"))
          ) {
            startBabyZoomSequence();
          }
        }

        note.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          openModal();
        });

        note.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openModal();
          }
        });

        closeBtn.addEventListener("click", function () {
          closeModal();
        });

        modal.addEventListener("click", function (e) {
          if (e.target === modal) {
            closeModal();
          }
        });

        document.addEventListener("keydown", function (e) {
          if (
            e.key === "Escape" &&
            modal &&
            !modal.hasAttribute("hidden")
          ) {
            closeModal();
          }
        });
      }

      initHiveNoteModal();

      var bees = document.querySelector(".bees");
      var btn = document.getElementById("btn-start");
      var flood = document.getElementById("beeHoneyFlood");
      var mq = window.matchMedia("(prefers-reduced-motion: reduce)");
      tutorialHasTouch = detectTouchDevice();
      if (!bees || !btn) return;

      var hiveStoryTimer;
      var hiveStoryClearTimer;
      var hiveStoryLineIndex = 0;

      function fillHiveStoryParagraph(paragraphEl, line) {
        var lang = GameI18n.getLang();
        var nu = "그 누구도";
        var am = "아무도";
        if (lang === "ko") {
          var i = line.indexOf(nu);
          if (i !== -1) {
            if (i > 0) {
              paragraphEl.appendChild(document.createTextNode(line.slice(0, i)));
            }
            var sp = document.createElement("span");
            sp.className = "hive-story__emph hive-story__emph--shake";
            sp.textContent = nu;
            paragraphEl.appendChild(sp);
            paragraphEl.appendChild(
              document.createTextNode(line.slice(i + nu.length))
            );
            return;
          }
          if (line.indexOf(am) === 0) {
            var sp2 = document.createElement("span");
            sp2.className = "hive-story__emph hive-story__emph--shake";
            sp2.textContent = am;
            paragraphEl.appendChild(sp2);
            paragraphEl.appendChild(document.createTextNode(line.slice(am.length)));
            return;
          }
          paragraphEl.appendChild(document.createTextNode(line));
          return;
        }
        function tryEnEmph(phrase) {
          var idx = line.indexOf(phrase);
          if (idx === -1) return false;
          if (idx > 0) {
            paragraphEl.appendChild(document.createTextNode(line.slice(0, idx)));
          }
          var spn = document.createElement("span");
          spn.className = "hive-story__emph hive-story__emph--shake";
          spn.textContent = phrase;
          paragraphEl.appendChild(spn);
          paragraphEl.appendChild(
            document.createTextNode(line.slice(idx + phrase.length))
          );
          return true;
        }
        if (tryEnEmph("no bee")) return;
        if (tryEnEmph("no one")) return;
        paragraphEl.appendChild(document.createTextNode(line));
      }

      function clearHiveStory() {
        var box = document.getElementById("hiveStory");
        var inner = document.getElementById("hiveStoryInner");
        if (inner) inner.textContent = "";
        if (box) box.setAttribute("hidden", "");
      }

      function startHiveGrandmaStory() {
        var box = document.getElementById("hiveStory");
        var inner = document.getElementById("hiveStoryInner");
        if (!box || !inner) return;
        window.clearTimeout(hiveStoryTimer);
        window.clearTimeout(hiveStoryClearTimer);
        inner.textContent = "";
        hiveStoryLineIndex = 0;
        box.removeAttribute("hidden");

        var grandmaLines = GameI18n.getGrandmaLines();

        function appendLine() {
          if (hiveStoryLineIndex >= grandmaLines.length) {
            return;
          }
          var p = document.createElement("p");
          p.className = "hive-story__p";
          fillHiveStoryParagraph(p, grandmaLines[hiveStoryLineIndex]);
          inner.appendChild(p);
          hiveStoryLineIndex += 1;
          if (hiveStoryLineIndex < grandmaLines.length) {
            var step = mq.matches ? 0 : 2200;
            hiveStoryTimer = window.setTimeout(appendLine, step);
          } else {
            hiveStoryClearTimer = window.setTimeout(clearHiveStory, 600);
          }
        }

        if (mq.matches) {
          for (var j = 0; j < grandmaLines.length; j++) {
            var pr = document.createElement("p");
            pr.className = "hive-story__p";
            fillHiveStoryParagraph(pr, grandmaLines[j]);
            inner.appendChild(pr);
          }
          hiveStoryClearTimer = window.setTimeout(clearHiveStory, 600);
          return;
        }
        appendLine();
      }

      function enterSkyOnly() {
        document.body.classList.remove("sky-only-ui");
        document.body.classList.add("sky-only");
        var scene = document.getElementById("bbatkkotScene");
        if (scene) {
          scene.removeAttribute("hidden");
          scene.setAttribute("aria-hidden", "false");
        }
        var treeWrap = document.querySelector(".bbatkkot-tree-wrap");
        window.setTimeout(function () {
          if (treeWrap) treeWrap.classList.add("bbatkkot-tree-wrap--zoom-hive");
          document.body.classList.add("bbatkkot-hive-inside");

          function showHiveRoom() {
            document.body.classList.add("hive-room-active");
            var room = document.getElementById("hiveRoom");
            if (room) {
              room.removeAttribute("hidden");
              room.setAttribute("aria-hidden", "false");
            }
            window.setTimeout(startHiveGrandmaStory, 700);
          }

          function armRoomAfterPause() {
            window.setTimeout(showHiveRoom, 300);
          }

          if (mq.matches || !treeWrap) {
            armRoomAfterPause();
            return;
          }

          var zoomHandled = false;
          function onZoomEnd(ev) {
            if (ev.propertyName !== "transform" || zoomHandled) return;
            zoomHandled = true;
            window.clearTimeout(zoomFallback);
            treeWrap.removeEventListener("transitionend", onZoomEnd);
            armRoomAfterPause();
          }
          treeWrap.addEventListener("transitionend", onZoomEnd, false);
          var zoomFallback = window.setTimeout(function () {
            if (zoomHandled) return;
            zoomHandled = true;
            treeWrap.removeEventListener("transitionend", onZoomEnd);
            armRoomAfterPause();
          }, 1300);
        }, 300);
      }

      function beginYellowExit() {
        if (
          !flood ||
          document.body.classList.contains("sky-only") ||
          flood.classList.contains("is-exiting")
        ) {
          return;
        }
        if (mq.matches) {
          enterSkyOnly();
          return;
        }
        document.body.classList.add("sky-only-ui");
        var shrink = flood.querySelector(".bee-honey-flood__shrink");
        if (!shrink) {
          enterSkyOnly();
          return;
        }
        flood.classList.add("is-exiting");
        var exitFallback = window.setTimeout(function () {
          enterSkyOnly();
        }, 850);
        shrink.addEventListener(
          "animationend",
          function onShrink(ev) {
            if (ev.animationName !== "bee-honey-shrink-br") return;
            window.clearTimeout(exitFallback);
            shrink.removeEventListener("animationend", onShrink);
            enterSkyOnly();
          },
          false
        );
      }

      function showHoneyFlood() {
        if (!flood || flood.classList.contains("is-active")) return;
        flood.removeAttribute("hidden");
        flood.classList.add("is-active");
        flood.setAttribute("aria-hidden", "false");

        var lastWave = flood.querySelector(".bee-honey-flood__wave--3");
        var skyTimer;

        function scheduleSkyOnly() {
          skyTimer = window.setTimeout(function () {
            skyTimer = null;
            beginYellowExit();
          }, 380);
        }

        function onWaveEnd(ev) {
          if (ev.animationName !== "bee-honey-expand") return;
          lastWave.removeEventListener("animationend", onWaveEnd);
          scheduleSkyOnly();
        }

        if (lastWave) {
          lastWave.addEventListener("animationend", onWaveEnd, false);
        } else {
          scheduleSkyOnly();
        }

        window.setTimeout(function () {
          if (document.body.classList.contains("sky-only")) return;
          if (skyTimer) window.clearTimeout(skyTimer);
          enterSkyOnly();
        }, 8000);
      }

      function initSettingsModal() {
        var modal = document.getElementById("settingsModal");
        var btnSettings = document.getElementById("btn-settings");
        var btnClose = document.getElementById("settingsModalClose");
        var langBtn = document.getElementById("settingsLangBtn");
        var picker = document.getElementById("settingsLangPicker");
        var koBtn = document.getElementById("settingsLangKo");
        var enBtn = document.getElementById("settingsLangEn");
        if (!modal || !btnSettings || !btnClose || !langBtn || !picker) return;

        function closeSettings() {
          modal.setAttribute("hidden", "");
          picker.setAttribute("hidden", "");
          langBtn.setAttribute("aria-expanded", "false");
        }

        btnSettings.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          GameI18n.apply(GameI18n.getLang());
          modal.removeAttribute("hidden");
        });

        btnClose.addEventListener("click", closeSettings);

        modal.addEventListener("click", function (e) {
          if (e.target === modal) closeSettings();
        });

        langBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (picker.hasAttribute("hidden")) {
            picker.removeAttribute("hidden");
            langBtn.setAttribute("aria-expanded", "true");
          } else {
            picker.setAttribute("hidden", "");
            langBtn.setAttribute("aria-expanded", "false");
          }
        });

        function pickLang(lang) {
          GameI18n.setLang(lang);
          picker.setAttribute("hidden", "");
          langBtn.setAttribute("aria-expanded", "false");
        }

        if (koBtn) {
          koBtn.addEventListener("click", function () {
            pickLang("ko");
          });
        }
        if (enBtn) {
          enBtn.addEventListener("click", function () {
            pickLang("en");
          });
        }

        document.addEventListener("keydown", function (e) {
          if (
            e.key === "Escape" &&
            modal &&
            !modal.hasAttribute("hidden")
          ) {
            closeSettings();
          }
        });
      }

      initSettingsModal();

      btn.addEventListener("click", function () {
        if (
          mq.matches ||
          bees.classList.contains("bees--start-dash") ||
          bees.classList.contains("bees--offscreen")
        ) {
          return;
        }
        bees.classList.add("bees--start-dash");
        bees.addEventListener(
          "animationend",
          function onEnd(e) {
            if (e.animationName !== "bee-start-dash") return;
            bees.classList.remove("bees--start-dash");
            bees.classList.add("bees--offscreen");
            bees.removeEventListener("animationend", onEnd);
            window.setTimeout(showHoneyFlood, 1700);
          },
          false
        );
      });
    })();
  </script>
</body>
</html>
